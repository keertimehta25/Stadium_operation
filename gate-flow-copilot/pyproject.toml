[tool.pylint."MESSAGES CONTROL"]
# The actual Gemini API-call logic (build client, call generate_content,
# validate, strip) lives in exactly one place: src/genai_client.py. Each
# domain module (recommender, navigation_assistant, accessibility_assistant,
# translator) still defines its own thin `_call_genai`/`_translate_text`
# wrapper that delegates to it, so `@patch("src.<module>._call_genai")` can
# still target one module at a time in tests and a failure in one assistant
# still can't take down another — without copy-pasting the implementation
# four times.

[tool.black]
line-length = 100

[tool.isort]
profile = "black"
line_length = 100
